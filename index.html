<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lista de Tarefas</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Minha Lista de Tarefas</h1>
            <div class="task-stats">
                <span class="stat-badge pending" id="pending-count">Pendentes: 0</span>
                <span class="stat-badge completed" id="completed-count">Concluídas: 0</span>
            </div>
        </header>
        
        <main>
            <div class="input-section">
                <input type="text" id="task-input" placeholder="O que você precisa fazer?" autocomplete="off" aria-label="Nova tarefa" aria-invalid="false">
                <button id="add-btn" aria-label="Adicionar tarefa">
                    <i class="fas fa-plus"></i> Adicionar
                </button>
            </div>
            <div id="error-message" class="error-message" role="alert" aria-live="polite"></div>

            <div id="empty-state" class="empty-state" aria-hidden="true">
                <i class="fas fa-clipboard-list"></i>
                <p>Nenhuma tarefa adicionada</p>
            </div>

            <ul id="task-list" class="task-list">
                <!-- As tarefas serão inseridas aqui via JavaScript -->
            </ul>
        </main>
    </div>

    <!-- Modal de Edição -->
    <div id="edit-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="modal-title" aria-modal="true">
        <div class="modal-content">
            <h2 id="modal-title">Editar Tarefa</h2>
            <input type="text" id="edit-task-input" autocomplete="off" aria-label="Editar texto da tarefa">
            <div id="edit-error-message" class="error-message" role="alert" aria-live="polite"></div>
            <div class="modal-actions">
                <button id="cancel-edit-btn" class="btn-secondary">Cancelar</button>
                <button id="save-edit-btn" class="btn-primary">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Exclusão -->
    <div id="delete-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="delete-modal-title" aria-modal="true">
        <div class="modal-content delete-content">
            <h2 id="delete-modal-title">Excluir Tarefa</h2>
            <p>Tem certeza que deseja remover esta tarefa da lista? Esta ação não pode ser desfeita.</p>
            <div class="modal-actions">
                <button id="cancel-delete-btn" class="btn-secondary">Cancelar</button>
                <button id="confirm-delete-btn" class="btn-danger">Remover</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
